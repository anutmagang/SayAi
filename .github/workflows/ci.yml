name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sayai
          POSTGRES_PASSWORD: sayai
          POSTGRES_DB: sayai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sayai -d sayai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      SECRET_KEY: ci-test-secret-key-must-be-long-enough-32
      DATABASE_URL: postgresql+psycopg://sayai:sayai@localhost:5432/sayai
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check app tests

      - name: Alembic upgrade
        run: alembic upgrade head

      - name: Pytest
        run: pytest -q
